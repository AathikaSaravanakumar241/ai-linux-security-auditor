services:

  postgres:
    image: postgres:17
    container_name: linux_audit_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: linux_audit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d linux_audit"]
      interval: 5s
      timeout: 5s
      retries: 5

  audit-target:
    build:
      context: ./infrastructure
      dockerfile: Dockerfile.audit
    container_name: audit_target
    ports:
      - "2222:22"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: linux_audit_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/linux_audit
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=gemini-2.0-flash
      - SSH_TIMEOUT=30
      - SSH_COMMAND_TIMEOUT=60
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: linux_audit_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
